<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제 첫 웹사이트에 오신 것을 환영합니다.</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cursor" id="cursor"></div>
<canvas id="fireworks-canvas"></canvas>

<section class="hero">
  <div class="badge">🎉 FIRST WEBSITE EVER</div>
  <h1>나 드디어<br><span class="hl">웹사이트</span><br>만들었다!!!</h1>
  <p class="sub">오류와 싸우고 구글링 100번 하고 드디어 완성 🥲</p>

  <div class="photo-frame" onclick="document.getElementById('img-upload').click()" title="클릭해서 사진 바꾸기">
    <div class="photo-placeholder" id="placeholder" style="display:none">
      <span>📸</span>
      <p>클릭해서 사진 추가</p>
    </div>
    <img id="hero-img" alt="내가해냄!" src="image.jpg" style="display:block">
  </div>
  <input type="file" id="img-upload" accept="image/*">

  <div class="counter-section">
    <div class="counter-box"><div class="num" id="cnt-d">0</div><div class="lbl">D+</div></div>
    <div class="counter-box"><div class="num" id="cnt-h">00</div><div class="lbl">시간</div></div>
    <div class="counter-box"><div class="num" id="cnt-m">00</div><div class="lbl">분</div></div>
    <div class="counter-box"><div class="num" id="cnt-s">00</div><div class="lbl">초</div></div>
  </div>

  <button class="celebrate-btn" onclick="launchFireworks()">🎆 축하해줘!!!</button>
</section>

<section class="guestbook">
  <h2 class="sec-title">방명록 <span>남겨줘</span> 👀</h2>
  <div class="gb-form">
    <input type="text" id="g-name" placeholder="이름 (예: 친구A)" maxlength="20">
    <textarea id="g-msg" placeholder="축하 메시지 남겨줘 ㅋㅋ (욕 금지)" maxlength="200"></textarea>
    <button class="submit-btn" onclick="submitEntry()">남기기 💬</button>
  </div>
  <div class="entries" id="entries">
    <div class="empty-msg">아직 아무도 안 남겼다... 첫 번째가 돼봐 👀</div>
  </div>
</section>

<footer>
  이 웹사이트는 <strong>수많은 오류</strong>와 <strong>구글링</strong> 끝에 탄생했습니다 🫡<br>
  만든 날: <strong id="made-date"></strong>
</footer>

<script src="script.js"></script>
</body>
</html>
